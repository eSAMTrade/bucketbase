[project]
name = "bucketbase"
version = "1.6.0"  # do not edit manually. kept in sync with `tool.commitizen` config via automation
description = "bucketbase"
authors = [{ name = "Andrei Suiu", email = "andrei.suiu@gmail.com" }]
readme = "README.py.md"
license = "MIT"
requires-python = ">=3.10,<4.0.0"
dependencies = [
    "streamerate>=1.2.1",
    "pyxtension>=1.17.1",
    "filelock>=3.20.0",
    "exceptiongroup>=1.0.0; python_version < '3.11'",
    "typing-extensions>=4.0.0",
]

[project.urls]
Repository = "https://github.com/asuiu/bucketbase"

[project.optional-dependencies]
minio = [
    "certifi>=2024.0.0",
    "minio>=7.2.4,<=8.0.0",
    "multiminio>=1.0.2",
    "packaging>=23.0",
    "urllib3>=1.26.0",
]

[dependency-groups]
dev = [
    "minio>=7.2.18,<8.0.0",
    "multiminio>=1.0.2,<2.0.0",
    "packaging>=23.0",
    "tsx>=0.2.14",
    "pyarrow>=21.0.0",
    "twine>=6.1.0",
    "pre-commit>=4.3.0",
    "psutil>=7.1.3,<8.0.0",
]

[tool.black]
line-length = 160
include = '\.pyi?$'
default_language_version = '3.10'

[tool.pylint.master]
#ignore="tests,test_integrations"
ignore-patterns = ["test_.*"]
load-plugins = ["pylint.extensions.no_self_use"]

[tool.pylint.messages_control]
disable = ["import-error",
    "missing-module-docstring",
    "missing-class-docstring",
    "invalid-name",
    "no-name-in-module",
    "missing-function-docstring",
    "too-few-public-methods",
    "too-many-instance-attributes",
    "logging-fstring-interpolation"]
output-format = "colorized"
enable = "useless-suppression"

[tool.pylint.design]
max-line-length = 160
max-locals = 25
max-args = 10

[tool.ruff]
# Enable Pyflakes `E` and `F` codes by default.
select = ["E", "F"]
ignore = ["E501"]


# Allow autofix for all enabled rules (when `--fix`) is provided.
fixable = ["A", "B", "C", "D", "E", "F"]
unfixable = []

[tool.isort]
profile = "black"
known_first_party = ["bucketbase"]
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]


[tool.commitizen]
name = "cz_conventional_commits"
version = "1.2.3"  # do not edit manually. kept in sync with `project` config via automation
tag_format = "v$version"

# Same as Black.
line-length = 160

[tool.coverage.run]
branch = true

[tool.coverage.report]
exclude_also = [
    "if TYPE_CHECKING:"
]

[tool.hatch.build.targets.wheel]
packages = ["bucketbase"]

[tool.hatch.build.targets.sdist]
include = [
    "/.pytest.ini",
    "/README.py.md",
    "/bucketbase",
    "/pyproject.toml",
    "/tests",
    "/upload.bat",
    "/upload.sh",
    "/uv.lock",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
